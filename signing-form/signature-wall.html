<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signum — Signature Wall</title>
  <style>
    :root {
      --bg: #0b0b0f;
      --bg-elevated: #13131a;
      --bg-card: #1a1a24;
      --bg-hover: #22222e;
      --border: #2a2a3a;
      --text: #e8e8f0;
      --text-muted: #9ca3af;
      --violet: #8b5cf6;
      --violet-bright: #a78bfa;
      --violet-dim: rgba(139, 92, 246, 0.12);
      --teal: #14b8a6;
      --teal-bright: #2dd4bf;
      --teal-dim: rgba(20, 184, 166, 0.12);
      --green: #22c55e;
      --green-dim: rgba(34, 197, 94, 0.12);
      --amber: #f59e0b;
      --amber-dim: rgba(245, 158, 11, 0.12);
      --blue: #3b82f6;
      --blue-dim: rgba(59, 130, 246, 0.12);
      --red: #f43f5e;
      --gray: #6b7280;
      --gray-dim: rgba(107, 114, 128, 0.12);
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 8px 30px rgba(0, 0, 0, 0.45);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
      min-height: 100vh;
    }

    .signum-wall {
      max-width: 800px;
      margin: 0 auto;
      padding: 24px 16px 64px;
    }

    @media (min-width: 640px) {
      .signum-wall { padding: 40px 24px 80px; }
    }

    .wall-header {
      text-align: center;
      padding: 24px 0 32px;
      background: radial-gradient(ellipse at 50% 0%, rgba(139, 92, 246, 0.12), transparent 60%);
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }

    .wall-header h1 {
      font-size: 1.35rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin: 0 0 18px;
      line-height: 1.3;
      background: linear-gradient(90deg, var(--violet-bright), var(--teal-bright));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    @media (min-width: 640px) {
      .wall-header h1 { font-size: 1.65rem; }
    }

    .stats-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      flex-wrap: wrap;
    }

    .stat {
      text-align: center;
    }

    .stat .number {
      font-size: 2.25rem;
      font-weight: 900;
      color: var(--text);
      line-height: 1;
      display: block;
    }

    .stat .label {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-top: 6px;
      display: block;
    }

    .stat.qualifying .number {
      background: linear-gradient(90deg, var(--violet-bright), var(--teal-bright));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .last-updated {
      width: 100%;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 16px;
    }

    .sign-link {
      margin: 14px 0 0;
      font-size: 0.95rem;
    }

    .sign-link a {
      color: var(--violet-bright);
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .tab {
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-muted);
      font-size: 0.95rem;
      font-weight: 700;
      padding: 10px 14px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .tab:hover { color: var(--text); }
    .tab.active {
      color: var(--violet-bright);
      border-bottom-color: var(--violet);
    }

    .error-message {
      background: rgba(244, 63, 94, 0.1);
      border: 1px solid rgba(244, 63, 94, 0.25);
      color: var(--red);
      padding: 16px;
      border-radius: var(--radius-sm);
      text-align: center;
      margin: 24px 0;
    }

    .empty-state {
      text-align: center;
      color: var(--text-muted);
      padding: 40px 20px;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
    }

    .signature-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .signature-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
      transition: background 0.15s, border-color 0.15s;
    }

    .signature-card:hover {
      background: var(--bg-hover);
      border-color: #3a3a4d;
    }

    .signature-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      flex-shrink: 0;
      display: grid;
      place-items: center;
      font-weight: 900;
      font-size: 1rem;
      color: #fff;
      background: linear-gradient(135deg, var(--violet), var(--teal));
      text-transform: uppercase;
    }

    .signature-meta {
      flex: 1;
      min-width: 0;
    }

    .name-line {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .display-name {
      font-weight: 800;
      font-size: 1rem;
      color: var(--text);
      word-break: break-word;
    }

    .nip05 {
      font-size: 0.82rem;
      color: var(--text-muted);
      word-break: break-all;
    }

    .nip05 a {
      color: var(--text-muted);
      text-decoration: none;
    }

    .nip05 a:hover { color: var(--violet-bright); }

    .badges {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      white-space: nowrap;
    }

    .badge.human { background: var(--green-dim); color: var(--green); }
    .badge.ai_agent { background: var(--violet-dim); color: var(--violet-bright); }
    .badge.hybrid { background: var(--teal-dim); color: var(--teal-bright); }
    .badge.collective { background: var(--amber-dim); color: var(--amber); }
    .badge.organization { background: var(--blue-dim); color: var(--blue); }
    .badge.uncertain { background: var(--gray-dim); color: var(--gray); }

    .zap-badge {
      background: rgba(245, 158, 11, 0.12);
      color: var(--amber);
    }

    .trust-score {
      margin-left: auto;
      text-align: right;
      flex-shrink: 0;
    }

    .trust-number {
      font-size: 1.1rem;
      font-weight: 900;
      color: var(--text);
    }

    .trust-bar {
      width: 64px;
      height: 5px;
      background: var(--bg-elevated);
      border-radius: 999px;
      margin-top: 4px;
      overflow: hidden;
    }

    .trust-bar-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--violet), var(--teal));
    }

    .statement {
      color: var(--text-muted);
      font-size: 0.92rem;
      margin: 10px 0 0;
      line-height: 1.5;
      word-break: break-word;
    }

    .statement.collapsed {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .expand-statement {
      background: transparent;
      border: none;
      color: var(--violet-bright);
      font-size: 0.82rem;
      font-weight: 700;
      padding: 4px 0 0;
      cursor: pointer;
    }

    .expand-statement:hover { color: var(--teal-bright); }

    .signature-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 12px;
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .signature-footer a {
      color: var(--text-muted);
      text-decoration: none;
    }

    .signature-footer a:hover { color: var(--violet-bright); }

    .gated-section {
      margin-top: 28px;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      background: var(--bg-elevated);
      overflow: hidden;
    }

    .gated-toggle {
      width: 100%;
      background: transparent;
      border: none;
      color: var(--text-muted);
      padding: 14px 16px;
      font-size: 0.9rem;
      font-weight: 700;
      text-align: left;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .gated-toggle:hover { color: var(--text); }

    .gated-toggle .chevron {
      transition: transform 0.2s;
      font-size: 0.8rem;
    }

    .gated-section.open .gated-toggle .chevron { transform: rotate(180deg); }

    .gated-content {
      display: none;
      padding: 0 16px 16px;
    }

    .gated-section.open .gated-content { display: block; }

    .gated-hint {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .gated-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .gated-list .signature-card {
      background: var(--bg-card);
      opacity: 0.8;
    }

    .transparency-footer {
      margin-top: 32px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      font-size: 0.82rem;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .transparency-footer strong {
      color: var(--text);
      font-weight: 700;
    }

    .transparency-footer a { color: var(--violet-bright); }

    .weight-pill {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 4px;
      background: var(--bg-card);
      margin: 2px 4px 2px 0;
      font-size: 0.78rem;
    }

    .hidden { display: none !important; }

    .loading {
      text-align: center;
      color: var(--text-muted);
      padding: 40px 20px;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.15);
      border-top-color: var(--violet-bright);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>

    const RELATIVE_TIME_UNITS = [
      { label: "year", seconds: 31536000 },
      { label: "month", seconds: 2592000 },
      { label: "week", seconds: 604800 },
      { label: "day", seconds: 86400 },
      { label: "hour", seconds: 3600 },
      { label: "minute", seconds: 60 },
      { label: "second", seconds: 1 }
    ];

    function getConfig() {
      const container = document.getElementById("signum-wall");
      if (typeof window.SignumWallConfig === "object" && window.SignumWallConfig.feedUrl) {
        return window.SignumWallConfig.feedUrl;
      }
      const attr = container && container.getAttribute("data-feed-url");
      if (attr) return attr;
      return null;
    }

    function truncateNpub(npub, length = 16) {
      if (!npub || npub.length <= length * 2 + 3) return npub;
      return npub.slice(0, length) + "…" + npub.slice(-length);
    }

    function formatRelativeTime(timestampSeconds) {
      const now = Math.floor(Date.now() / 1000);
      const diff = now - timestampSeconds;
      const abs = Math.abs(diff);
      const unit = RELATIVE_TIME_UNITS.find(u => abs >= u.seconds) || RELATIVE_TIME_UNITS[RELATIVE_TIME_UNITS.length - 1];
      const count = Math.max(1, Math.floor(abs / unit.seconds));
      const suffix = diff < 0 ? "from now" : "ago";
      return `${count} ${unit.label}${count === 1 ? "" : "s"} ${suffix}`;
    }

    function formatDateTime(isoString) {
      if (!isoString) return "";
      try {
        const d = new Date(isoString);
        return d.toLocaleString(undefined, {
          year: "numeric",
          month: "short",
          day: "numeric",
          hour: "2-digit",
          minute: "2-digit",
          timeZoneName: "short"
        });
      } catch {
        return isoString;
      }
    }

    function nip05Href(nip05) {
      if (!nip05) return null;
      const parts = nip05.split("@");
      if (parts.length !== 2) return null;
      const [name, domain] = parts;
      return `https://${domain}/.well-known/nostr.json?name=${encodeURIComponent(name)}`;
    }

    function renderName(sig) {
      if (sig.display_name) return sig.display_name;
      return truncateNpub(sig.npub);
    }

    function renderAvatar(sig) {
      const name = renderName(sig);
      return name.slice(0, 2);
    }

    function renderStatement(sig) {
      const text = sig.statement || "";
      if (!text) return "";
      const maxLines = 2;
      const approxCharsPerLine = 80;
      const collapsedClass = text.length > approxCharsPerLine * maxLines ? "collapsed" : "";
      return `
        <p class="statement ${collapsedClass}" id="stmt-${sig.event_id}">${escapeHtml(text)}</p>
        ${collapsedClass ? `<button class="expand-statement" data-target="stmt-${sig.event_id}">Show more</button>` : ""}
      `;
    }

    function renderSignatureCard(sig) {
      const name = renderName(sig);
      const nip05 = sig.nip05 || "";
      const nip05Link = nip05Href(nip05);
      const entityClass = ENTITY_COLORS[sig.entity_type] || "uncertain";
      const entityLabel = sig.entity_type || "uncertain";
      const statementHtml = renderStatement(sig);
      const relativeTime = formatRelativeTime(sig.timestamp);
      const nostrAtLink = sig.event_id
        ? `<a href="https://nostr.at/${sig.event_id}" target="_blank" rel="noopener" title="View signature event">${relativeTime}</a>`
        : relativeTime;

      return `
        <article class="signature-card" data-event-id="${escapeHtml(sig.event_id || "")}">
          <div class="signature-header">
            <div class="avatar" aria-hidden="true">${escapeHtml(renderAvatar(sig))}</div>
            <div class="signature-meta">
              <div class="name-line">
                <span class="display-name">${escapeHtml(name)}</span>
              </div>
              ${nip05 ? `<div class="nip05">${nip05Link ? `<a href="${nip05Link}" target="_blank" rel="noopener">${escapeHtml(nip05)}</a>` : escapeHtml(nip05)}</div>` : ""}
              <div class="badges">
                <span class="badge ${entityClass}">${escapeHtml(entityLabel)}</span>
                ${sig.zapped ? `<span class="badge zap-badge">⚡ Zapped</span>` : ""}
              </div>
            </div>
            <div class="trust-score" title="Trust score: ${sig.trust_score}/100">
              <span class="trust-number">${sig.trust_score}</span>
              <div class="trust-bar"><div class="trust-bar-fill" style="width: ${Math.min(100, Math.max(0, sig.trust_score))}%"></div></div>
            </div>
          </div>
          ${statementHtml}
          <div class="signature-footer">
            <span>${nostrAtLink}</span>
            <span>Trust: ${Object.entries(sig.trust_breakdown || {}).map(([k, v]) => `${escapeHtml(k)} ${v}`).join(" · ")}</span>
          </div>
        </article>
      `;
    }

    function escapeHtml(str) {
      if (str == null) return "";
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function renderHeader(data) {
      const petition = data.petition || {};
      const stats = data.stats || {};
      document.getElementById("petition-title").textContent = petition.title || "Untitled petition";
      document.getElementById("qualifying-count").textContent = formatCount(stats.qualifying_signatures);
      document.getElementById("total-count").textContent = formatCount(stats.total_signatures);
      document.getElementById("threshold-count").textContent = stats.threshold != null ? `${stats.threshold}/100` : "—";
      document.getElementById("last-updated").textContent = stats.last_updated
        ? `Last updated: ${formatDateTime(stats.last_updated)}`
        : "";
    }

    function formatCount(n) {
      if (n == null) return "—";
      return n.toLocaleString();
    }

    function renderList(containerId, signatures) {
      const container = document.getElementById(containerId);
      if (!signatures || signatures.length === 0) {
        container.innerHTML = `<div class="empty-state">No signatures to display.</div>`;
        return;
      }
      container.innerHTML = signatures.map(renderSignatureCard).join("");

      container.querySelectorAll(".expand-statement").forEach(btn => {
        btn.addEventListener("click", () => {
          const target = document.getElementById(btn.getAttribute("data-target"));
          if (!target) return;
          target.classList.toggle("collapsed");
          btn.textContent = target.classList.contains("collapsed") ? "Show more" : "Show less";
        });
      });
    }

    function renderGated(data) {
      const gated = (data.signatures_chronological || []).filter(s => s.gated);
      const section = document.getElementById("gated-section");
      const label = document.getElementById("gated-label");
      if (!gated.length) {
        section.classList.add("hidden");
        return;
      }
      section.classList.remove("hidden");
      label.textContent = `${gated.length} signature${gated.length === 1 ? "" : "s"} below trust threshold`;
      renderList("gated-list", gated);
    }

    function renderFooter(data) {
      const methodology = data.trust_methodology || {};
      const weights = methodology.weights || {};
      const weightPills = Object.entries(weights)
        .map(([k, v]) => `<span class="weight-pill">${escapeHtml(k)}: ${v}%</span>`)
        .join("");
      const providers = (methodology.providers || [])
        .map(p => `<a href="https://${escapeHtml(p)}" target="_blank" rel="noopener">${escapeHtml(p)}</a>`)
        .join(", ") || "none declared";
      const threshold = methodology.threshold != null ? `${methodology.threshold}/100` : "—";

      document.getElementById("transparency-footer").innerHTML = `
        <strong>Trust methodology:</strong> ${weightPills || "not published"}<br>
        <strong>Providers:</strong> ${providers}<br>
        <strong>Threshold:</strong> ${threshold}<br>
        All signatures are publicly verifiable on Nostr.
      `;
    }

    function showError(message) {
      const status = document.getElementById("wall-status");
      status.className = "error-message";
      status.innerHTML = escapeHtml(message);
      document.getElementById("wall-content").classList.add("hidden");
    }

    function hideStatus() {
      const status = document.getElementById("wall-status");
      status.classList.add("hidden");
      document.getElementById("wall-content").classList.remove("hidden");
    }

    let currentData = null;
    let currentView = "chronological";

    function renderWall(data) {
      currentData = data;
      renderHeader(data);
      renderSignaturesView(currentView);
      renderGated(data);
      renderFooter(data);
      hideStatus();
    }

    function renderSignaturesView(view) {
      if (!currentData) return;
      const key = view === "trust_weighted" ? "signatures_trust_weighted" : "signatures_chronological";
      const signatures = currentData[key] || [];
      renderList("signature-list", signatures);
    }

    function setActiveTab(view) {
      document.querySelectorAll(".tab").forEach(tab => {
        tab.classList.toggle("active", tab.getAttribute("data-view") === view);
      });
    }

    async function loadData() {
      const feedUrl = getConfig();

      if (!feedUrl) {
        // No feed URL configured: render inline sample data for demo/development.
        renderWall(SAMPLE_DATA);
        return;
      }

      try {
        const response = await fetch(feedUrl, { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }
        const data = await response.json();
        renderWall(data);
      } catch (err) {
        console.error("Signum wall failed to load feed:", err);
        showError("Unable to load signatures. The feed may be unavailable or misconfigured.");
      }
    }

    function initTabs() {
      document.querySelectorAll(".tab").forEach(tab => {
        tab.addEventListener("click", () => {
          const view = tab.getAttribute("data-view");
          currentView = view;
          setActiveTab(view);
          renderSignaturesView(view);
        });
      });

      const gatedToggle = document.getElementById("gated-toggle");
      if (gatedToggle) {
        gatedToggle.addEventListener("click", () => {
          document.getElementById("gated-section").classList.toggle("open");
        });
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      initTabs();
      loadData();
    });

    // Expose a minimal API for programmatic refresh/config changes.
    window.SignumWall = {
      refresh: loadData,
      setFeedUrl: (url) => {
        const container = document.getElementById("signum-wall");
        if (container) container.setAttribute("data-feed-url", url);
        return loadData();
      }
    };
  </script>
</body>
</html>
